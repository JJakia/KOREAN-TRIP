<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="首爾">
  <meta name="theme-color" content="#E8A87C">
  <title>首爾旅遊地圖 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=80a4afa6bdeb8635d40f16450b4deb39&libraries=services"></script>
</head>
<body>
<div id="app">

  <header class="app-header">
    <button class="back-btn" id="back-btn" style="display:none">←</button>
    <div class="header-title">
      <h1 id="header-title">首爾旅遊地圖</h1>
      <p id="header-sub">5月24日—31日</p>
    </div>
  </header>

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="home-hero">
      <h2>서울 여행 🇰🇷</h2>
      <p>口袋地圖 · 按區域探索</p>
      <div class="dates">📅 2026年 5/24 – 5/31</div>
    </div>

    <div class="accom-chip">
      <span class="ac-icon">🏠</span>
      <div class="ac-body">
        <div class="ac-name">住宿（弘大・新村一帶）</div>
        <div class="ac-addr">地址待填</div>
      </div>
      <a class="kakao-btn" href="https://map.kakao.com/link/map/住宿,37.5569974,126.937875" target="_blank">
        <span class="kb-icon">🗺</span><span>Kakao</span>
      </a>
    </div>

    <div class="legend-row">
      <span class="legend-item"><span class="legend-dot" style="background:#7EC8E3"></span>逛逛逛</span>
      <span class="legend-item"><span class="legend-dot" style="background:#F4A460"></span>餐廳食物</span>
      <span class="legend-item"><span class="legend-dot" style="background:#9B7EC8"></span>SVT</span>
      <span class="legend-item"><span class="legend-dot" style="background:#7EC8A0"></span>PLAVE</span>
    </div>

    <div class="section-label">選擇區域 → 查看地圖</div>
    <div class="region-grid" id="region-grid"></div>
  </div>

  <!-- REGION PAGE -->
  <div class="page" id="page-region">
    <div id="kakao-map"></div>
    <div id="subway-chips" class="subway-chips"></div>
    <div id="cat-tabs" class="cat-tabs"></div>
    <div id="place-list" class="place-list"></div>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
