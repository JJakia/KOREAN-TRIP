<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="首爾小旅行">
  <meta name="theme-color" content="#F5EFE6">
  <title>首爾小旅行</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ═══ HOME PAGE ═══ -->
  <div class="page active" id="page-home">
    <div class="home-inner">

      <!-- Header -->
      <div class="home-header">
        <div class="home-header-left">
          <div class="app-title">首爾小旅行 <span class="heart">♡</span></div>
          <div class="app-sub">一起去喜歡的地方吧！</div>
        </div>
        <div class="header-icon">🗺️</div>
      </div>

      <!-- 住宿卡片 -->
      <div class="accom-card">
        <div class="accom-card-icon">🛏️</div>
        <div class="accom-card-body">
          <div class="accom-label">住宿位置</div>
          <div class="accom-name" id="accom-name">弘大・新村一帶</div>
          <div class="accom-addr" id="accom-addr">Seoul, Korea</div>
        </div>
        <div class="accom-illus">🏠</div>
      </div>

      <!-- 選擇區域 -->
      <div class="section-title">選擇區域</div>
      <div class="region-grid" id="region-grid"></div>

      <!-- 地鐵線路圖 -->
      <div class="section-title" style="margin-top:4px">
        地鐵路線圖 <span style="font-size:16px">🚇</span>
      </div>
      <div class="subway-map-card">
        <div class="subway-map-inner" id="subway-map-svg"></div>
      </div>

    </div>
  </div>

  <!-- ═══ REGION PAGE ═══ -->
  <div class="page" id="page-region">

    <!-- Top bar -->
    <div class="region-topbar">
      <button class="back-btn" id="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="region-topbar-title" id="region-topbar-title">區域</div>
      <div style="width:36px"></div>
    </div>

    <!-- Kakao Map -->
    <div id="kakao-map"></div>

    <!-- 地鐵站 chips -->
    <div id="subway-chips" class="subway-chips"></div>

    <!-- 分類 tabs -->
    <div id="cat-tabs" class="cat-tabs"></div>

    <!-- 地點列表 -->
    <div id="place-list" class="place-list"></div>

  </div>

</div>

<!-- Kakao Maps SDK -->
<script>
// Load Kakao Maps after page load to avoid blocking
function loadKakaoMap() {
  return new Promise((resolve, reject) => {
    if (window.kakao && window.kakao.maps) { resolve(); return; }
    const s = document.createElement('script');
    s.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=80a4afa6bdeb8635d40f16450b4deb39&autoload=false';
    s.onload = () => kakao.maps.load(resolve);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}
</script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
